name: QuantAgri Daily Monitor

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Run mode'
        required: true
        default: 'daily'
        type: choice
        options:
          - daily
          - weekly
          - backfill
      commodities:
        description: 'Commodities to run (leave blank for all active)'
        required: false
        default: ''

jobs:

  # Run each active commodity in its own parallel job
  # so no single job hits the 6-hour limit
  soy:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install --upgrade pip && pip install -r requirements.txt
      - name: Restore cache
        uses: actions/cache@v4
        with:
          path: quantagri_live/
          key: quantagri-live-soy-${{ github.run_number }}
          restore-keys: quantagri-live-soy-
      - name: Run soy
        env:
          PYTHONPATH: quantagri
        run: |
          python quantagri/quantagri_live_monitor.py \
            --mode ${{ github.event.inputs.mode || 'daily' }} \
            --output_dir quantagri_live \
            --yield_csv official_yields.csv \
            --resolution 100 \
            --commodities soy \
            --dashboard
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: live-soy-${{ github.run_number }}
          path: quantagri_live/
          retention-days: 7

  wheat:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install --upgrade pip && pip install -r requirements.txt
      - name: Restore cache
        uses: actions/cache@v4
        with:
          path: quantagri_live/
          key: quantagri-live-wheat-${{ github.run_number }}
          restore-keys: quantagri-live-wheat-
      - name: Run wheat
        env:
          PYTHONPATH: quantagri
        run: |
          python quantagri/quantagri_live_monitor.py \
            --mode ${{ github.event.inputs.mode || 'daily' }} \
            --output_dir quantagri_live \
            --yield_csv official_yields.csv \
            --resolution 100 \
            --commodities wheat \
            --dashboard
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: live-wheat-${{ github.run_number }}
          path: quantagri_live/
          retention-days: 7

  corn:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install --upgrade pip && pip install -r requirements.txt
      - name: Restore cache
        uses: actions/cache@v4
        with:
          path: quantagri_live/
          key: quantagri-live-corn-${{ github.run_number }}
          restore-keys: quantagri-live-corn-
      - name: Run corn
        env:
          PYTHONPATH: quantagri
        run: |
          python quantagri/quantagri_live_monitor.py \
            --mode ${{ github.event.inputs.mode || 'daily' }} \
            --output_dir quantagri_live \
            --yield_csv official_yields.csv \
            --resolution 100 \
            --commodities corn \
            --dashboard
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: live-corn-${{ github.run_number }}
          path: quantagri_live/
          retention-days: 7

  cotton:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install --upgrade pip && pip install -r requirements.txt
      - name: Restore cache
        uses: actions/cache@v4
        with:
          path: quantagri_live/
          key: quantagri-live-cotton-${{ github.run_number }}
          restore-keys: quantagri-live-cotton-
      - name: Run cotton
        env:
          PYTHONPATH: quantagri
        run: |
          python quantagri/quantagri_live_monitor.py \
            --mode ${{ github.event.inputs.mode || 'daily' }} \
            --output_dir quantagri_live \
            --yield_csv official_yields.csv \
            --resolution 100 \
            --commodities cotton \
            --dashboard
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: live-cotton-${{ github.run_number }}
          path: quantagri_live/
          retention-days: 7


  # Merge all results and commit back to repo
  commit-results:
    runs-on: ubuntu-latest
    needs: [soy, wheat, corn, cotton]
    if: always()
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all_artifacts/
          pattern: live-*

      - name: Merge CSVs into quantagri_live/
        run: |
          mkdir -p quantagri_live

          # Merge all quantagri_live_results.csv files — header once, data appended
          FIRST=true
          for f in all_artifacts/live-*/quantagri_live_results.csv; do
            if [ -f "$f" ]; then
              if $FIRST; then
                cp "$f" quantagri_live/quantagri_live_results.csv
                FIRST=false
              else
                tail -n +2 "$f" >> quantagri_live/quantagri_live_results.csv
              fi
            fi
          done

          # Merge alerts
          FIRST=true
          for f in all_artifacts/live-*/quantagri_live_alerts.csv; do
            if [ -f "$f" ]; then
              if $FIRST; then
                cp "$f" quantagri_live/quantagri_live_alerts.csv
                FIRST=false
              else
                tail -n +2 "$f" >> quantagri_live/quantagri_live_alerts.csv
              fi
            fi
          done

          # Merge logs
          cat all_artifacts/live-*/quantagri_live/quantagri_monitor.log \
            >> quantagri_live/quantagri_monitor.log 2>/dev/null || true

          echo "=== Merged results ==="
          wc -l quantagri_live/*.csv 2>/dev/null || echo "No CSV files yet"

      - name: Commit merged results
        run: |
          git config user.name  "QuantAgri Bot"
          git config user.email "actions@github.com"
          git add quantagri_live/
          git diff --staged --quiet || git commit -m \
            "chore: live monitor $(date -u '+%Y-%m-%d %H:%M UTC') [skip ci]"
          git push

      - name: Upload merged artifact
        uses: actions/upload-artifact@v4
        with:
          name: quantagri-live-merged-${{ github.run_number }}
          path: quantagri_live/
          retention-days: 30
