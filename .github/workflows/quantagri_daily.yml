name: QuantAgri Daily Monitor

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Run mode'
        required: true
        default: 'daily'
        type: choice
        options:
          - daily
          - weekly
          - backfill
      commodities:
        description: 'Commodities to run (leave blank for all active)'
        required: false
        default: ''

jobs:

  # Run each active commodity in its own parallel job
  # so no single job hits the 6-hour limit
  soy:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install --upgrade pip && pip install -r requirements.txt
      - name: Restore cache
        uses: actions/cache@v4
        with:
          path: quantagri_live/
          key: quantagri-live-soy-${{ github.run_number }}
          restore-keys: quantagri-live-soy-
      - name: Run soy
        env:
          PYTHONPATH: quantagri
        run: |
          python quantagri/quantagri_live_monitor.py \
            --mode ${{ github.event.inputs.mode || 'daily' }} \
            --output_dir quantagri_live \
            --yield_csv official_yields.csv \
            --resolution 500 \
            --commodities soy \
            --dashboard
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: live-soy-${{ github.run_number }}
          path: quantagri_live/
          retention-days: 7

  wheat:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install --upgrade pip && pip install -r requirements.txt
      - name: Restore cache
        uses: actions/cache@v4
        with:
          path: quantagri_live/
          key: quantagri-live-wheat-${{ github.run_number }}
          restore-keys: quantagri-live-wheat-
      - name: Run wheat
        env:
          PYTHONPATH: quantagri
        run: |
          python quantagri/quantagri_live_monitor.py \
            --mode ${{ github.event.inputs.mode || 'daily' }} \
            --output_dir quantagri_live \
            --yield_csv official_yields.csv \
            --resolution 100 \
            --commodities wheat \
            --dashboard
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: live-wheat-${{ github.run_number }}
          path: quantagri_live/
          retention-days: 7

  corn:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install --upgrade pip && pip install -r requirements.txt
      - name: Restore cache
        uses: actions/cache@v4
        with:
          path: quantagri_live/
          key: quantagri-live-corn-${{ github.run_number }}
          restore-keys: quantagri-live-corn-
      - name: Run corn
        env:
          PYTHONPATH: quantagri
        run: |
          python quantagri/quantagri_live_monitor.py \
            --mode ${{ github.event.inputs.mode || 'daily' }} \
            --output_dir quantagri_live \
            --yield_csv official_yields.csv \
            --resolution 100 \
            --commodities corn \
            --dashboard
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: live-corn-${{ github.run_number }}
          path: quantagri_live/
          retention-days: 7

  cotton:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install --upgrade pip && pip install -r requirements.txt
      - name: Restore cache
        uses: actions/cache@v4
        with:
          path: quantagri_live/
          key: quantagri-live-cotton-${{ github.run_number }}
          restore-keys: quantagri-live-cotton-
      - name: Run cotton
        env:
          PYTHONPATH: quantagri
        run: |
          python quantagri/quantagri_live_monitor.py \
            --mode ${{ github.event.inputs.mode || 'daily' }} \
            --output_dir quantagri_live \
            --yield_csv official_yields.csv \
            --resolution 100 \
            --commodities cotton \
            --dashboard
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: live-cotton-${{ github.run_number }}
          path: quantagri_live/
          retention-days: 7


  # Merge all results and commit back to repo
  commit-results:
    runs-on: ubuntu-latest
    needs: [soy, wheat, corn, cotton]
    if: always()
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all_artifacts/
          pattern: live-*

      - name: Merge CSVs into quantagri_live/
        run: |
          mkdir -p quantagri_live
          pip install pandas -q

          python3 << 'PYEOF'
          import pandas as pd, os, glob

          # Collect all new results from artifacts
          new_files = glob.glob("all_artifacts/live-*/quantagri_live_results.csv")
          if not new_files:
              print("No new result files found")
              exit(0)

          new_df = pd.concat([pd.read_csv(f) for f in new_files], ignore_index=True)

          # Load existing results from repo (if any)
          existing_path = "quantagri_live/quantagri_live_results.csv"
          if os.path.exists(existing_path):
              existing_df = pd.read_csv(existing_path)
              combined = pd.concat([existing_df, new_df], ignore_index=True)
          else:
              combined = new_df

          # Deduplicate: keep latest run_timestamp per commodity+region+as_of_date
          combined = combined.sort_values("run_timestamp")
          combined = combined.drop_duplicates(
              subset=["commodity", "region_id", "as_of_date"], keep="last"
          )
          combined = combined.sort_values(["as_of_date", "commodity", "region_id"])
          combined.to_csv(existing_path, index=False)
          print(f"✅ {len(combined)} unique rows saved")

          # Same for alerts
          alert_files = glob.glob("all_artifacts/live-*/quantagri_live_alerts.csv")
          if alert_files:
              alert_df = pd.concat([pd.read_csv(f) for f in alert_files], ignore_index=True)
              alert_path = "quantagri_live/quantagri_live_alerts.csv"
              if os.path.exists(alert_path):
                  existing_alerts = pd.read_csv(alert_path)
                  alert_df = pd.concat([existing_alerts, alert_df], ignore_index=True)
                  alert_df = alert_df.drop_duplicates()
              alert_df.to_csv(alert_path, index=False)
          PYEOF

          echo "=== Final row counts ==="
          wc -l quantagri_live/*.csv 2>/dev/null || echo "No CSV files yet"

      - name: Commit merged results
        run: |
          git config user.name  "QuantAgri Bot"
          git config user.email "actions@github.com"
          git add quantagri_live/
          git diff --staged --quiet || git commit -m \
            "chore: live monitor $(date -u '+%Y-%m-%d %H:%M UTC') [skip ci]"
          git push

      - name: Upload merged artifact
        uses: actions/upload-artifact@v4
        with:
          name: quantagri-live-merged-${{ github.run_number }}
          path: quantagri_live/
          retention-days: 30
