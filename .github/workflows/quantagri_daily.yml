name: QuantAgri Daily Monitor

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Run mode'
        required: true
        default: 'daily'
        type: choice
        options:
          - daily
          - weekly
          - backfill

jobs:

  soy:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install --upgrade pip && pip install -r requirements.txt
      - name: Restore cache
        uses: actions/cache@v4
        with:
          path: quantagri_live/
          key: quantagri-live-soy-${{ github.run_number }}
          restore-keys: quantagri-live-soy-
      - name: Run soy
        env:
          PYTHONPATH: quantagri
        run: |
          python quantagri/quantagri_live_monitor.py \
            --mode ${{ github.event.inputs.mode || 'daily' }} \
            --output_dir quantagri_live \
            --yield_csv official_yields.csv \
            --resolution 500 \
            --commodities soy \
            --dashboard
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: live-soy-${{ github.run_number }}
          path: quantagri_live/
          retention-days: 7

  wheat:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install --upgrade pip && pip install -r requirements.txt
      - name: Restore cache
        uses: actions/cache@v4
        with:
          path: quantagri_live/
          key: quantagri-live-wheat-${{ github.run_number }}
          restore-keys: quantagri-live-wheat-
      - name: Run wheat
        env:
          PYTHONPATH: quantagri
        run: |
          python quantagri/quantagri_live_monitor.py \
            --mode ${{ github.event.inputs.mode || 'daily' }} \
            --output_dir quantagri_live \
            --yield_csv official_yields.csv \
            --resolution 200 \
            --commodities wheat \
            --dashboard
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: live-wheat-${{ github.run_number }}
          path: quantagri_live/
          retention-days: 7

  corn:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install --upgrade pip && pip install -r requirements.txt
      - name: Restore cache
        uses: actions/cache@v4
        with:
          path: quantagri_live/
          key: quantagri-live-corn-${{ github.run_number }}
          restore-keys: quantagri-live-corn-
      - name: Run corn
        env:
          PYTHONPATH: quantagri
        run: |
          python quantagri/quantagri_live_monitor.py \
            --mode ${{ github.event.inputs.mode || 'daily' }} \
            --output_dir quantagri_live \
            --yield_csv official_yields.csv \
            --resolution 200 \
            --commodities corn \
            --dashboard
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: live-corn-${{ github.run_number }}
          path: quantagri_live/
          retention-days: 7

  cotton:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install --upgrade pip && pip install -r requirements.txt
      - name: Restore cache
        uses: actions/cache@v4
        with:
          path: quantagri_live/
          key: quantagri-live-cotton-${{ github.run_number }}
          restore-keys: quantagri-live-cotton-
      - name: Run cotton
        env:
          PYTHONPATH: quantagri
        run: |
          python quantagri/quantagri_live_monitor.py \
            --mode ${{ github.event.inputs.mode || 'daily' }} \
            --output_dir quantagri_live \
            --yield_csv official_yields.csv \
            --resolution 200 \
            --commodities cotton \
            --dashboard
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: live-cotton-${{ github.run_number }}
          path: quantagri_live/
          retention-days: 7

  commit-results:
    runs-on: ubuntu-latest
    needs: [soy, wheat, corn, cotton]
    if: always()
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all_artifacts/
          pattern: live-*

      - name: Merge and deduplicate CSVs
        run: |
          mkdir -p quantagri_live
          pip install pandas -q

          python3 - << 'PYEOF'
          import pandas as pd, os, glob

          new_files = glob.glob("all_artifacts/live-*/quantagri_live_results.csv")
          if not new_files:
              print("No new result files found")
              exit(0)

          new_df = pd.concat([pd.read_csv(f) for f in new_files], ignore_index=True)

          existing_path = "quantagri_live/quantagri_live_results.csv"
          if os.path.exists(existing_path):
              existing_df = pd.read_csv(existing_path)
              combined = pd.concat([existing_df, new_df], ignore_index=True)
          else:
              combined = new_df

          combined = combined.sort_values("run_timestamp")
          combined = combined.drop_duplicates(
              subset=["commodity", "region_id", "as_of_date"], keep="last"
          )
          combined = combined.sort_values(["as_of_date", "commodity", "region_id"])
          combined.to_csv(existing_path, index=False)
          print(f"Saved {len(combined)} unique rows")

          alert_files = glob.glob("all_artifacts/live-*/quantagri_live_alerts.csv")
          if alert_files:
              alert_df = pd.concat([pd.read_csv(f) for f in alert_files], ignore_index=True)
              alert_path = "quantagri_live/quantagri_live_alerts.csv"
              if os.path.exists(alert_path):
                  existing_alerts = pd.read_csv(alert_path)
                  alert_df = pd.concat([existing_alerts, alert_df], ignore_index=True)
                  alert_df = alert_df.drop_duplicates()
              alert_df.to_csv(alert_path, index=False)
          PYEOF

      - name: Install ML dependencies
        run: |
          pip install lightgbm scikit-learn shap ruptures -q

      - name: Train / update ML models
        env:
          PYTHONPATH: ${{ github.workspace }}/quantagri/ml
        run: |
          python3 quantagri/ml/train.py \
            --sat_csv quantagri_live/quantagri_live_results.csv \
            --historical_csv quantagri_historical/quantagri_monthly_ALL.csv \
            --yield_csv official_yields.csv \
            --model_dir ml_models
        continue-on-error: true

      - name: Generate signal scorecard
        env:
          PYTHONPATH: ${{ github.workspace }}/quantagri/ml
        run: |
          python3 quantagri/ml/score.py \
            --live_csv quantagri_live/quantagri_live_results.csv \
            --analysis_csv quantagri_analysis/quantagri_monthly_summary.csv \
            --output_csv quantagri_live/quantagri_signal_scorecard.csv
        continue-on-error: true

      - name: Commit results
        run: |
          git config user.name "QuantAgri Bot"
          git config user.email "actions@github.com"

          mkdir -p ml_models
          touch ml_models/.gitkeep

          git add quantagri_live/
          git add ml_models/ || true

          git diff --staged --quiet || git commit -m \
            "chore: live monitor $(date -u '+%Y-%m-%d %H:%M UTC') [skip ci]"
          git pull --rebase origin main
          git push

      - name: Upload merged artifact
        uses: actions/upload-artifact@v4
        with:
          name: quantagri-live-merged-${{ github.run_number }}
          path: |
            quantagri_live/
            ml_models/
          retention-days: 30

      - name: Check for alerts
        id: check_alerts
        run: |
          if [ -f "quantagri_live/quantagri_live_alerts.csv" ]; then
            LINES=$(wc -l < quantagri_live/quantagri_live_alerts.csv)
            if [ "$LINES" -gt 1 ]; then
              echo "alerts_fired=true" >> $GITHUB_OUTPUT
              echo "alert_count=$((LINES-1))" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Check for strong signals
        id: check_signals
        run: |
          if [ -f "quantagri_live/quantagri_signal_scorecard.csv" ]; then
            python3 - << 'PYEOF'
          import pandas as pd, os

          df = pd.read_csv("quantagri_live/quantagri_signal_scorecard.csv")
          strong = df[df["conviction_score"].abs() >= 3]

          if not strong.empty:
              with open(os.environ["GITHUB_OUTPUT"], "a") as f:
                  f.write("strong_signals=true\n")
                  f.write(f"strong_signal_count={len(strong)}\n")
              print(f"Strong signals found: {len(strong)}")
              print(strong[["commodity","region_id","conviction","conviction_score"]].to_string(index=False))
          else:
              print("No strong signals today")
          PYEOF
          fi

      - name: Create GitHub Issue for strong signals
        if: steps.check_signals.outputs.strong_signals == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const csv = fs.readFileSync('quantagri_live/quantagri_signal_scorecard.csv', 'utf8');
            const lines = csv.trim().split('\n');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `📡 QuantAgri Strong Signal — ${{ steps.check_signals.outputs.strong_signal_count }} conviction trade(s)`,
              body: `## QuantAgri Signal Scorecard\n\n**Run:** ${{ github.run_number }}\n**Date:** ${new Date().toUTCString()}\n\n\`\`\`\n${lines.join('\n')}\n\`\`\`\n\n[View run →](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})\n\n[View scorecard →](https://raw.githubusercontent.com/${{ github.repository }}/main/quantagri_live/quantagri_signal_scorecard.csv)`,
              labels: ['quantagri-signal']
            });

      - name: Create GitHub Issue for alerts
        if: steps.check_alerts.outputs.alerts_fired == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const alertCsv = fs.readFileSync('quantagri_live/quantagri_live_alerts.csv', 'utf8');
            const lines = alertCsv.trim().split('\n');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `⚠️ QuantAgri Alert — ${{ steps.check_alerts.outputs.alert_count }} threshold breach(es)`,
              body: `## QuantAgri Alert\n\n**Run:** ${{ github.run_number }}\n**Date:** ${new Date().toUTCString()}\n\n\`\`\`\n${lines.join('\n')}\n\`\`\`\n\n[View run →](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})`,
              labels: ['quantagri-alert']
            });
