name: QuantAgri Daily Monitor

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Run mode'
        required: true
        default: 'daily'
        type: choice
        options:
          - daily
          - weekly
          - backfill
      commodities:
        description: 'Commodities to run (leave blank for all active)'
        required: false
        default: ''

jobs:
  run-monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Restore live results cache
        uses: actions/cache@v4
        with:
          path: quantagri_live/
          key: quantagri-live-results-${{ github.run_number }}
          restore-keys: |
            quantagri-live-results-

      - name: List repo files (debug)
        run: find . -type f | sort

      - name: Run QuantAgri Live Monitor
        env:
          PYTHONPATH: quantagri
        run: |
          MODE="${{ github.event.inputs.mode || 'daily' }}"
          COMMODITIES="${{ github.event.inputs.commodities }}"

          CMD="python quantagri/quantagri_live_monitor.py \
            --mode $MODE \
            --output_dir quantagri_live \
            --yield_csv official_yields.csv \
            --resolution 100 \
            --dashboard"

          if [ -n "$COMMODITIES" ]; then
            CMD="$CMD --commodities $COMMODITIES"
          fi

          echo "Running: $CMD"
          eval $CMD

      - name: Commit live results
        run: |
          git config user.name  "QuantAgri Bot"
          git config user.email "actions@github.com"
          git add quantagri_live/
          git diff --staged --quiet || git commit -m \
            "chore: live monitor update $(date -u '+%Y-%m-%d %H:%M UTC') [skip ci]"
          git push

      - name: Upload results artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: quantagri-live-${{ github.run_number }}-${{ github.run_attempt }}
          path: |
            quantagri_live/quantagri_live_results.csv
            quantagri_live/quantagri_live_alerts.csv
            quantagri_live/quantagri_monitor.log
          retention-days: 30

      - name: Check for alerts
        id: check_alerts
        run: |
          if [ -f "quantagri_live/quantagri_live_alerts.csv" ]; then
            LINES=$(wc -l < quantagri_live/quantagri_live_alerts.csv)
            if [ "$LINES" -gt 1 ]; then
              echo "alerts_fired=true"  >> $GITHUB_OUTPUT
              echo "alert_count=$((LINES-1))" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Create GitHub Issue for alerts
        if: steps.check_alerts.outputs.alerts_fired == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const alertCsv = fs.readFileSync('quantagri_live/quantagri_live_alerts.csv', 'utf8');
            const lines = alertCsv.trim().split('\n');
            const header = lines[0];
            const newAlerts = lines.slice(1).join('\n');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              title: `⚠️ QuantAgri Alert — ${{ steps.check_alerts.outputs.alert_count }} signal(s) fired`,
              body:  `## QuantAgri Live Monitor Alert\n\n**Run:** ${{ github.run_number }}\n**Date:** ${new Date().toUTCString()}\n\n\`\`\`\n${header}\n${newAlerts}\n\`\`\`\n\n[View full run →](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})`,
              labels: ['quantagri-alert']
            });
