name: QuantAgri Historical Monthly

on:
  workflow_dispatch:
    inputs:
      commodity:
        description: 'Commodity to run'
        required: true
        default: 'wheat'
        type: choice
        options:
          - wheat
          - corn
          - soy
          - cotton
          - sugar
      start_year:
        description: 'Start year'
        required: true
        default: '2016'
      end_year:
        description: 'End year'
        required: true
        default: '2025'
      resolution:
        description: 'Resolution in metres'
        required: true
        default: '200'

jobs:
  run-historical:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Restore cache
        uses: actions/cache@v4
        with:
          path: quantagri_historical/
          key: historical-${{ github.event.inputs.commodity }}-${{ github.run_number }}
          restore-keys: |
            historical-${{ github.event.inputs.commodity }}-

      - name: Run historical monthly
        env:
          PYTHONPATH: quantagri
        run: |
          python quantagri/quantagri_historical_monthly.py \
            --commodities ${{ github.event.inputs.commodity }} \
            --start_year ${{ github.event.inputs.start_year }} \
            --end_year ${{ github.event.inputs.end_year }} \
            --resolution ${{ github.event.inputs.resolution }} \
            --output_dir quantagri_historical

      - name: Commit results
        run: |
          git config user.name "QuantAgri Bot"
          git config user.email "actions@github.com"
          git add quantagri_historical/
          git diff --staged --quiet || git commit -m \
            "data: historical ${{ github.event.inputs.commodity }} ${{ github.event.inputs.start_year }}-${{ github.event.inputs.end_year }} [skip ci]"
          git push

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: historical-${{ github.event.inputs.commodity }}-${{ github.run_number }}
          path: quantagri_historical/
          retention-days: 90
